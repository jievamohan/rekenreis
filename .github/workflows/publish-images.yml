# Publish web, api, e2e images to GHCR. PR gate pulls these; no local build in PR.
# Path-based triggers: only rebuild images whose inputs changed.
name: Publish images

on:
  push:
    branches: [main, master]
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'docker-bake.hcl'
      - 'apps/web/package.json'
      - 'apps/web/pnpm-lock.yaml'
      - 'apps/web/playwright.config.ts'
      - 'apps/web/e2e/**'
      - 'apps/web/**'
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web || steps.set-all.outputs.web }}
      api: ${{ steps.filter.outputs.api || steps.set-all.outputs.api }}
      e2e: ${{ steps.filter.outputs.e2e || steps.set-all.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            web:
              - 'docker/web.Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.ci.yml'
              - 'docker-bake.hcl'
              - 'apps/web/**'
            api:
              - 'docker/api.Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.ci.yml'
              - 'docker-bake.hcl'
              - 'apps/api/**'
            e2e:
              - 'docker/e2e.Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.ci.yml'
              - 'docker-bake.hcl'
              - 'apps/web/package.json'
              - 'apps/web/pnpm-lock.yaml'
              - 'apps/web/playwright.config.ts'
              - 'apps/web/e2e/**'
              # Not apps/web/**: web image covers app source; e2e only needs tests/deps/config

      - id: set-all
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "web=true" >> $GITHUB_OUTPUT
          echo "api=true" >> $GITHUB_OUTPUT
          echo "e2e=true" >> $GITHUB_OUTPUT

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./docker/web.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./docker/api.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push e2e
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/e2e.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/e2e:latest
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,mode=max,scope=e2e
