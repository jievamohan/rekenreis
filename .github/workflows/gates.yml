name: Gates

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  gate-c-typecheck:
    name: Gate C (Type-safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web typecheck
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run typecheck

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API PHPStan
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run phpstan

  gate-d-security:
    name: Gate D (Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Policy check
        run: bash scripts/ci/policy-check.sh

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-semgrep

      - name: Semgrep
        run: |
          pip install --quiet semgrep
          semgrep scan --config auto --config .semgrep --error

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: pnpm audit (web)
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm audit --prod || true

      - name: Composer audit (api)
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run audit-deps || true

      - name: Cache hadolint + trivy images
        uses: actions/cache@v4
        id: docker-tools-cache
        with:
          path: /tmp/docker-cache/tools
          key: docker-hadolint-trivy

      - name: Pull hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit != 'true'
        run: |
          docker pull hadolint/hadolint
          docker pull aquasec/trivy
          mkdir -p /tmp/docker-cache/tools
          docker save hadolint/hadolint aquasec/trivy -o /tmp/docker-cache/tools/tools.tar

      - name: Load hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/tools/tools.tar

      - name: Hadolint (Dockerfiles)
        run: |
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < apps/web/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < apps/api/Dockerfile

      - name: Trivy config scan
        run: |
          docker run --rm -v "$(pwd):/app" -w /app aquasec/trivy config . --exit-code 0 --severity HIGH,CRITICAL

  gate-f-build:
    name: Gate F (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web build
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run build

      - name: Web size
        run: cd apps/web && pnpm run size

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache mysql image
        uses: actions/cache@v4
        id: mysql-cache
        with:
          path: /tmp/docker-cache/mysql
          key: docker-mysql-8.0

      - name: Pull mysql image
        if: steps.mysql-cache.outputs.cache-hit != 'true'
        run: docker pull mysql:8.0 && mkdir -p /tmp/docker-cache/mysql && docker save mysql:8.0 -o /tmp/docker-cache/mysql/mysql.tar

      - name: Load mysql image
        if: steps.mysql-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/mysql/mysql.tar

      - name: Cache ZAP image
        uses: actions/cache@v4
        id: zap-cache
        with:
          path: /tmp/docker-cache/zap
          key: docker-zaproxy-stable

      - name: Pull ZAP image
        if: steps.zap-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          mkdir -p /tmp/docker-cache/zap
          docker save ghcr.io/zaproxy/zaproxy:stable -o /tmp/docker-cache/zap/zap.tar

      - name: Load ZAP image
        if: steps.zap-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/zap/zap.tar

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          load: true
          tags: rekenreis-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          scope: web

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          load: true
          tags: rekenreis-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          scope: api

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --no-build -d
          sleep 5
          docker compose logs api || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait

      - name: Wait for health
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:3000/start >/dev/null && curl -sf http://localhost:8001/api/health >/dev/null && echo "Stack ready" && exit 0
            echo "Waiting for stack ($i/40)..."
            sleep 3
          done
          echo "Stack failed to become healthy"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps -a
          docker compose logs web --tail 50
          docker compose logs api --tail 20
          exit 1

      - name: Security headers check
        run: bash scripts/ci/security-headers-check.sh

      - name: ZAP baseline (web)
        run: |
          mkdir -p artifacts/zap && chmod 777 artifacts/zap
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/start -I -m 2 \
            -J web-start-report.json -r web-start-report.html || true
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/play -I -m 2 \
            -J web-play-report.json -r web-play-report.html || true

      - name: ZAP baseline (api)
        run: |
          chmod 777 artifacts/zap
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/health -I -m 2 \
            -J api-health-report.json -r api-health-report.html || true
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/session-stats -I -m 2 \
            -J api-session-stats-report.json -r api-session-stats-report.html || true

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web lint
        run: cd apps/web && pnpm install --frozen-lockfile && pnpm run lint

      - name: Web test
        run: cd apps/web && pnpm run test

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API test
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run test
