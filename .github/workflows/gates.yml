name: Gates

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  gate-c-typecheck:
    name: Gate C (Type-safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web typecheck
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run typecheck

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API PHPStan
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run phpstan

  gate-d-security:
    name: Gate D (Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Policy check
        run: bash scripts/ci/policy-check.sh

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-semgrep

      - name: Semgrep
        run: |
          pip install --quiet semgrep
          semgrep scan --config auto --config .semgrep --error

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: pnpm audit (web)
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm audit --prod || true

      - name: Composer audit (api)
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run audit-deps || true

      - name: Cache hadolint + trivy images
        uses: actions/cache@v4
        id: docker-tools-cache
        with:
          path: /tmp/docker-cache/tools
          key: docker-hadolint-trivy

      - name: Pull hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit != 'true'
        run: |
          docker pull hadolint/hadolint
          docker pull aquasec/trivy
          mkdir -p /tmp/docker-cache/tools
          docker save hadolint/hadolint aquasec/trivy -o /tmp/docker-cache/tools/tools.tar

      - name: Load hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/tools/tools.tar

      - name: Hadolint (Dockerfiles)
        run: |
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < docker/web.Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < docker/api.Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < docker/e2e.Dockerfile

      - name: Trivy config scan
        run: |
          docker run --rm -v "$(pwd):/app" -w /app aquasec/trivy config . --exit-code 0 --severity HIGH,CRITICAL

  gate-f-build:
    name: Gate F (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web build
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run build

      - name: Web size
        run: cd apps/web && pnpm run size

  e2e-container:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache e2e stack images
        uses: actions/cache@v4
        id: e2e-images-cache
        with:
          path: /tmp/docker-cache/e2e-stack
          key: docker-e2e-stack-${{ github.event.pull_request.base.sha || format('push-{0}', github.sha) }}

      - name: Pull images
        if: steps.e2e-images-cache.outputs.cache-hit != 'true'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml pull web api e2e mysql
          mkdir -p /tmp/docker-cache/e2e-stack
          docker save ghcr.io/${{ github.repository }}/web:latest ghcr.io/${{ github.repository }}/api:latest ghcr.io/${{ github.repository }}/e2e:latest mysql:8.0 -o /tmp/docker-cache/e2e-stack/stack.tar

      - name: Load cached images
        if: steps.e2e-images-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/e2e-stack/stack.tar

      - name: Start stack
        run: |
          echo "## e2e-container step timing" >> "$GITHUB_STEP_SUMMARY"
          START=$(date +%s)
          docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml up -d --wait web api mysql
          END=$(date +%s)
          echo "- **Start:** $((END - START))s" >> "$GITHUB_STEP_SUMMARY"

      - name: Run Playwright tests (inside e2e container)
        run: bash scripts/ci/e2e-benchmark.sh

      - name: Upload e2e benchmark (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-benchmark
          path: artifacts/ci/e2e-duration-seconds.txt
          if-no-files-found: ignore

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml down -v

  zap-baseline:
    name: OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache ZAP image
        uses: actions/cache@v4
        id: zap-cache
        with:
          path: /tmp/docker-cache/zap
          key: docker-zaproxy-stable
          restore-keys: docker-zaproxy-

      - name: Pull ZAP image
        if: steps.zap-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          mkdir -p /tmp/docker-cache/zap
          docker save ghcr.io/zaproxy/zaproxy:stable -o /tmp/docker-cache/zap/zap.tar

      - name: Load ZAP image
        if: steps.zap-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/zap/zap.tar

      - name: Pull images and start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml pull web api mysql
          docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml up -d --wait web api mysql

      - name: Security headers check
        run: bash scripts/ci/security-headers-check.sh

      - name: ZAP baseline (parallel)
        run: |
          for d in zap-start zap-play zap-health zap-session; do
            mkdir -p "artifacts/zap/$d" && chmod 777 "artifacts/zap/$d"
          done
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap/zap-start:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/start -I -m 1 \
            -J web-start-report.json -r web-start-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap/zap-play:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/play -I -m 1 \
            -J web-play-report.json -r web-play-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap/zap-health:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/health -I -m 1 \
            -J api-health-report.json -r api-health-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap/zap-session:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/session-stats -I -m 1 \
            -J api-session-stats-report.json -r api-session-stats-report.html || true &
          wait

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.pull.yml down -v

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web lint
        run: cd apps/web && pnpm install --frozen-lockfile && pnpm run lint

      - name: Web test
        run: cd apps/web && pnpm run test

      - name: Diversity Gate
        run: cd apps/web && pnpm run gate:diversity

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API test
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run test
