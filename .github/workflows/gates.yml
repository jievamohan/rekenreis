name: Gates

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  gate-c-typecheck:
    name: Gate C (Type-safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web typecheck
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run typecheck

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API PHPStan
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run phpstan

  gate-d-security:
    name: Gate D (Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Policy check
        run: bash scripts/ci/policy-check.sh

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-semgrep

      - name: Semgrep
        run: |
          pip install --quiet semgrep
          semgrep scan --config auto --config .semgrep --error

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: pnpm audit (web)
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm audit --prod || true

      - name: Composer audit (api)
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run audit-deps || true

      - name: Cache hadolint + trivy images
        uses: actions/cache@v4
        id: docker-tools-cache
        with:
          path: /tmp/docker-cache/tools
          key: docker-hadolint-trivy

      - name: Pull hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit != 'true'
        run: |
          docker pull hadolint/hadolint
          docker pull aquasec/trivy
          mkdir -p /tmp/docker-cache/tools
          docker save hadolint/hadolint aquasec/trivy -o /tmp/docker-cache/tools/tools.tar

      - name: Load hadolint + trivy images
        if: steps.docker-tools-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/tools/tools.tar

      - name: Hadolint (Dockerfiles)
        run: |
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < apps/web/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < apps/api/Dockerfile

      - name: Trivy config scan
        run: |
          docker run --rm -v "$(pwd):/app" -w /app aquasec/trivy config . --exit-code 0 --severity HIGH,CRITICAL

  gate-f-build:
    name: Gate F (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web build
        run: |
          cd apps/web && pnpm install --frozen-lockfile
          pnpm run build

      - name: Web size
        run: cd apps/web && pnpm run size

  e2e-container:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache pnpm store (for e2e container)
        uses: actions/cache@v4
        with:
          path: ./.cache/pnpm
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Pull Playwright image
        run: docker pull mcr.microsoft.com/playwright:v1.49.0-jammy

      - name: Build images (cached)
        uses: docker/bake-action@v6
        with:
          source: .
          files: docker-bake.hcl
          load: true
          targets: web,api
          set: |
            web.cache-from=type=gha,scope=web
            web.cache-to=type=gha,mode=max,scope=web
            api.cache-from=type=gha,scope=api
            api.cache-to=type=gha,mode=max,scope=api

      - name: Start stack (no rebuild)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --no-build -d web api mysql
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait web api mysql

      - name: Install web deps (inside e2e container, cached store)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm e2e sh -lc \
            "npm install -g pnpm@9 && pnpm config set store-dir /pnpm-store && pnpm install --frozen-lockfile"

      - name: Run Playwright tests (inside e2e container)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm e2e sh -lc \
            "npm install -g pnpm@9 && pnpm config set store-dir /pnpm-store && pnpm test:e2e"

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  zap-baseline:
    name: OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache mysql image
        uses: actions/cache@v4
        id: mysql-cache
        with:
          path: /tmp/docker-cache/mysql
          key: docker-mysql-8.0
          restore-keys: docker-mysql-

      - name: Pull mysql image
        if: steps.mysql-cache.outputs.cache-hit != 'true'
        run: docker pull mysql:8.0 && mkdir -p /tmp/docker-cache/mysql && docker save mysql:8.0 -o /tmp/docker-cache/mysql/mysql.tar

      - name: Load mysql image
        if: steps.mysql-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/mysql/mysql.tar

      - name: Cache ZAP image
        uses: actions/cache@v4
        id: zap-cache
        with:
          path: /tmp/docker-cache/zap
          key: docker-zaproxy-stable
          restore-keys: docker-zaproxy-

      - name: Pull ZAP image
        if: steps.zap-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          mkdir -p /tmp/docker-cache/zap
          docker save ghcr.io/zaproxy/zaproxy:stable -o /tmp/docker-cache/zap/zap.tar

      - name: Load ZAP image
        if: steps.zap-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/zap/zap.tar

      - name: Build images (parallel)
        uses: docker/bake-action@v6
        with:
          source: .
          files: docker-bake.hcl
          load: true
          targets: web,api
          set: |
            web.cache-from=type=gha,scope=web
            web.cache-to=type=gha,mode=max,scope=web
            api.cache-from=type=gha,scope=api
            api.cache-to=type=gha,mode=max,scope=api

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --no-build -d web api mysql
          sleep 5
          docker compose logs api || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait web api mysql

      - name: Wait for health
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:3000/start >/dev/null && curl -sf http://localhost:8001/api/health >/dev/null && echo "Stack ready" && exit 0
            echo "Waiting for stack ($i/12)..."
            sleep 2
          done
          echo "Stack failed to become healthy"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps -a
          docker compose logs web --tail 50
          docker compose logs api --tail 20
          exit 1

      - name: Security headers check
        run: bash scripts/ci/security-headers-check.sh

      - name: ZAP baseline (parallel)
        run: |
          mkdir -p artifacts/zap && chmod 777 artifacts/zap
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/start -I -m 1 \
            -J web-start-report.json -r web-start-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://web:3000/play -I -m 1 \
            -J web-play-report.json -r web-play-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/health -I -m 1 \
            -J api-health-report.json -r api-health-report.html || true &
          docker run --rm --network rekenreis_default -v "$(pwd)/artifacts/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://api:8000/api/session-stats -I -m 1 \
            -J api-session-stats-report.json -r api-session-stats-report.html || true &
          wait

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Web lint
        run: cd apps/web && pnpm install --frozen-lockfile && pnpm run lint

      - name: Web test
        run: cd apps/web && pnpm run test

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: API test
        run: |
          cd apps/api && composer install --no-interaction --prefer-dist
          composer run test
