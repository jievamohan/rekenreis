# CI override: web uses built image directly (no volume binds, no pnpm install at runtime)
# e2e: use custom image with pnpm pre-installed (Epic 25.2)
services:
  e2e:
    image: rekenreis-e2e:latest

  web:
    user: "1000:1000"  # node user (override base root for CI least-privilege)
    working_dir: /app
    command: pnpm run dev --host 0.0.0.0
    volumes:
      - /repo
      - /repo/apps/web/node_modules
      - /pnpm-store
    environment:
      - NUXT_PUBLIC_API_URL=http://api:8000
