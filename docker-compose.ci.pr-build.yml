# PR e2e: build web from checkout so tests run against PR code, not main's image.
# Source is volume-mounted; node_modules from workflow pnpm install.
services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: rekenreis-web-pr:latest
    pull_policy: never
    user: "0:0"  # root to avoid GHA runner vs container UID mismatch on mounted node_modules
    working_dir: /repo/apps/web
    volumes:
      - ./:/repo
      # Don't mount host node_modules: container is Alpine (musl), host is Ubuntu (glibc) - rollup native bindings differ.
      # Run pnpm install in container to get correct @rollup/rollup-linux-x64-musl.
    command: ["sh", "-c", "pnpm install --frozen-lockfile && exec pnpm run dev --host 0.0.0.0 --port 3000"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/start', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      start_period: 120s
      interval: 5s
      timeout: 5s
      retries: 30
