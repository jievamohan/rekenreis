# PR e2e: source volume-mounted, no build. Base image has Node; pnpm via corepack.
services:
  web:
    image: node:22-alpine
    pull_policy: if_not_present
    user: "0:0"  # root to avoid GHA runner vs container UID mismatch on mounted node_modules
    working_dir: /repo/apps/web
    volumes:
      - ./:/repo
    command: ["sh", "-c", "corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && exec pnpm run dev --host 0.0.0.0 --port 3000"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/start', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      start_period: 120s
      interval: 5s
      timeout: 5s
      retries: 30
